    <text class="ts" x="340" y="50" text-anchor="middle" dominant-baseline="central">PDF · image · invoice · form</text></g>
  <line x1="340" y1="60" x2="340" y2="92" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
