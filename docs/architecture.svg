    <text class="ts" x="510" y="730" text-anchor="middle" dominant-baseline="central">hybrid search · GPT-4.1-mini</text></g>
  <line x1="340" y1="736" x2="340" y2="776" fill="none" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
