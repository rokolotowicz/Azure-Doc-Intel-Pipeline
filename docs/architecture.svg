<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Azure Intelligent Document Processing Pipeline Architecture</title>
  <desc>End-to-end architecture showing document ingestion through Event Grid, Azure Functions, four AI services, dual-write to AI Search indexes, Cosmos DB, and Static Web App dashboard.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .th { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .ts { font-size: 11px; font-weight: 400; fill: #64748b; }
      .nb rect { fill: #eff6ff; stroke: #3b82f6; } .nb .th { fill: #1d4ed8; }
      .np rect { fill: #f5f3ff; stroke: #7c3aed; } .np .th { fill: #5b21b6; }
      .nt rect { fill: #f0fdfa; stroke: #0d9488; } .nt .th { fill: #0f766e; }
      .na rect { fill: #fffbeb; stroke: #d97706; } .na .th { fill: #92400e; }
      .nc rect { fill: #fff1f0; stroke: #e05c2a; } .nc .th { fill: #9a3412; }
      .ng rect { fill: #f0fdf4; stroke: #16a34a; } .ng .th { fill: #15803d; }
      .ns rect { fill: #f8fafc; stroke: #94a3b8; } .ns .th { fill: #334155; }
    </style>
  </defs>
  <g class="ns"><rect x="230" y="16" width="220" height="44" rx="8" stroke-width="0.5"/>
