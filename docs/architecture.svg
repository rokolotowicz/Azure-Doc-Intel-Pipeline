  <text class="ts" x="510" y="638" text-anchor="middle" dominant-baseline="central">text-embedding-3-large · 3072-dim</text>
  <line x1="170" y1="620" x2="170" y2="680" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="510" y1="645" x2="510" y2="680" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
