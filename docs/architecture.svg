  <path d="M246 400 L310 464" fill="none" stroke="#94a3b8" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M394 400 L370 464" fill="none" stroke="#94a3b8" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M580 400 L400 464" fill="none" stroke="#94a3b8" stroke-width="0.8" marker-end="url(#arrow)"/>
  <g class="ns"><rect x="190" y="464" width="300" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="482" text-anchor="middle" dominant-baseline="central">Merge enrichment results</text>
    <text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central">uuid.uuid5(blob_name) — idempotent ID</text></g>
