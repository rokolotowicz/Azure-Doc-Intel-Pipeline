name: Deploy Azure Doc Intelligence Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-doc-intelligence-pipeline
  AZURE_LOCATION: eastus
  PROJECT_PREFIX: docpipe

jobs:
  # -------------------------------------------------------------------------
  # Validate Bicep on every PR
  # -------------------------------------------------------------------------
  validate-infra:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Lint Bicep
        run: az bicep build --file infra/main.bicep

      - name: Validate deployment
        run: |
          az deployment group validate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environment=dev projectPrefix=${{ env.PROJECT_PREFIX }}

  # -------------------------------------------------------------------------
  # Deploy infrastructure (main branch only)
  # -------------------------------------------------------------------------
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate-infra
    if: github.ref == 'refs/heads/main'
    outputs:
      function_app_name:    ${{ steps.deploy.outputs.functionAppName }}
      static_web_app_name:  ${{ steps.deploy.outputs.staticWebAppName }}
      storage_account_name: ${{ steps.deploy.outputs.storageAccountName }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags project=doc-intelligence-pipeline managedBy=github-actions

      - name: Deploy Bicep
        id: deploy
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environment=dev projectPrefix=${{ env.PROJECT_PREFIX }} \
            --query 'properties.outputs' -o json)
          echo "functionAppName=$(echo $OUTPUT | jq -r '.functionAppName.value')" >> $GITHUB_OUTPUT
          echo "storageAccountName=$(echo $OUTPUT | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT

  # -------------------------------------------------------------------------
  # Deploy Azure Functions
  # -------------------------------------------------------------------------
  deploy-functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: deploy-infra
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd functions
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infra.outputs.function_app_name }}
          package: functions
          scm-do-build-during-deployment: true

  # -------------------------------------------------------------------------
  # Deploy Static Web App
  # -------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infra
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend
          output_location: dist
